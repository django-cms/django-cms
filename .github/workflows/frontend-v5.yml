name: django CMS frontend_v5

# Independent CI workflow for the cms.contrib.frontend_v5 contrib app.
# Kept separate from frontend.yml so the legacy frontend job is unaffected
# by anything we do in the new TypeScript stack.

on:
  pull_request:
    paths:
      - 'cms/contrib/frontend_v5/**'
      - 'package.json'
      - 'package-lock.json'
      - 'testserver.py'
      - '.github/workflows/frontend-v5.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback job — runs on every push. Pure-JS checks only:
  # typecheck, vitest, webpack/sass build. No browser, no Python.
  checks:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '24'

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck:v5

      - name: Unit tests (vitest)
        run: npm run test:v5

      - name: Build bundles
        run: npm run build:v5

  # Integration job — runs the Playwright suite against a real Django
  # testserver with the contrib app in INSTALLED_APPS. Slower than
  # `checks` because of chromium download + Python dep install, so
  # kept as a separate job that parallelises with `checks`.
  e2e:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '24'
      PYTHON_VERSION: '3.12'

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Use Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python test requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r test_requirements/django-5.2.txt

      - run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build contrib bundles
        # e2e tests need the built bundles served via staticfiles.
        run: npm run build:v5

      - name: Run Playwright integration tests
        run: npm run test:v5:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
